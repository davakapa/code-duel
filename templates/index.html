<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Code Duel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #1e1e2e;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav { display: flex; gap: 16px; align-items: center; }

        .nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 15px;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .nav a:hover { background: #2a2a3e; color: white; }
        .nav .username { color: #a855f7; font-weight: bold; font-size: 15px; }
        .nav .logout { color: #ff6b6b; border: 1px solid #ff6b6b; }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            width: 440px;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle { color: #888; margin-bottom: 24px; font-size: 16px; }

        .welcome {
            background: #1e1e2e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 20px;
            margin-bottom: 20px;
            color: #ccc;
            font-size: 15px;
        }

        .welcome span { color: #a855f7; font-weight: bold; }

        /* Выбор сложности */
        .difficulty-select { margin-bottom: 16px; }

        .difficulty-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: left;
        }

        .difficulty-buttons { display: flex; gap: 8px; }

        .btn-diff {
            flex: 1;
            padding: 12px 8px;
            background: #1e1e2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #aaa;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: auto;
            margin-bottom: 0;
        }

        .btn-diff span {
            font-size: 11px;
            color: #666;
            font-weight: normal;
        }

        .btn-diff:hover { border-color: #a855f7; color: white; }

        .btn-diff.active[data-diff="easy"] {
            border-color: #4ade80;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .btn-diff.active[data-diff="easy"] span { color: #4ade80; opacity: 0.7; }

        .btn-diff.active[data-diff="medium"] {
            border-color: #fbbf24;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        .btn-diff.active[data-diff="medium"] span { color: #fbbf24; opacity: 0.7; }

        .btn-diff.active[data-diff="hard"] {
            border-color: #f87171;
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .btn-diff.active[data-diff="hard"] span { color: #f87171; opacity: 0.7; }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #1e1e2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }

        input:focus { border-color: #a855f7; }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        .btn-find {
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            color: white;
            font-size: 18px;
            padding: 16px;
        }

        .btn-create {
            background: #1e1e2e;
            color: white;
            border: 1px solid #a855f7;
        }

        .btn-join {
            background: #1e1e2e;
            color: white;
            border: 1px solid #555;
        }

        .btn-cancel {
            background: #2a2a3e;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            display: none;
        }

        .divider { color: #444; margin: 16px 0; font-size: 14px; }

        #error { color: #ff6b6b; margin-top: 10px; font-size: 14px; }

        #searching-box {
            display: none;
            background: #1e1e2e;
            border: 1px solid #a855f7;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 12px;
        }

        .searching-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }

        .searching-dots {
            font-size: 28px;
            letter-spacing: 6px;
            color: #a855f7;
            animation: pulse 1.5s infinite;
        }

        .searching-diff {
            margin-top: 8px;
            font-size: 13px;
            color: #888;
        }

        .searching-timer { color: #888; font-size: 14px; margin-top: 4px; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .bottom-links { margin-top: 24px; display: flex; justify-content: center; gap: 24px; }
        .bottom-links a { color: #a855f7; text-decoration: none; font-size: 14px; }
        .bottom-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">⚔️ Code Duel</div>
    <div class="nav">
        <span class="username">👤 {{ username }}</span>
        <a href="/profile/{{ username }}">Профиль</a>
        <a href="/leaderboard">🏆 Рейтинг</a>
        <a href="/logout" class="logout">Выйти</a>
    </div>
</div>

<div class="main">
    <div class="container">
        <h1>⚔️ Code Duel</h1>
        <p class="subtitle">Сразись в программировании с реальным соперником</p>

        <div class="welcome">Привет, <span>{{ username }}</span>! Готов к дуэли?</div>

        <!-- Выбор сложности -->
        <div class="difficulty-select">
            <div class="difficulty-label">Выбери сложность задачи:</div>
            <div class="difficulty-buttons">
                <button class="btn-diff active" data-diff="easy">
                    🟢 Лёгкая
                    <span>+25 / -50</span>
                </button>
                <button class="btn-diff" data-diff="medium">
                    🟡 Средняя
                    <span>+50 / -25</span>
                </button>
                <button class="btn-diff" data-diff="hard">
                    🔴 Сложная
                    <span>+100 / -10</span>
                </button>
            </div>
        </div>

        <!-- Поиск соперника -->
        <div id="searching-box">
            <div class="searching-title">🔍 Ищем соперника...</div>
            <div class="searching-dots">● ● ●</div>
            <div class="searching-diff" id="searching-diff"></div>
            <div class="searching-timer" id="search-timer">0 сек</div>
        </div>

        <button class="btn-find" id="btn-find">🎮 Найти соперника</button>
        <button class="btn-cancel" id="btn-cancel">✕ Отменить поиск</button>

        <div class="divider">— или играй с другом —</div>

        <button class="btn-create" id="btn-create">🚀 Создать комнату</button>

        <input type="text" id="room_code" placeholder="Код комнаты" maxlength="8"/>
        <button class="btn-join" id="btn-join">⚔️ Войти в комнату</button>

        <div id="error"></div>

        <div class="bottom-links">
            <a href="/leaderboard">🏆 Таблица лидеров</a>
            <a href="/profile/{{ username }}">👤 Мой профиль</a>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const username = "{{ username }}";
    let searchTimer = null;
    let searchSeconds = 0;
    let selectedDifficulty = 'easy';

    // Выбор сложности
    document.querySelectorAll('.btn-diff').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedDifficulty = this.dataset.diff;
        });
    });

    function showError(msg) {
        document.getElementById('error').textContent = msg;
    }

    // Найти соперника
    document.getElementById('btn-find').addEventListener('click', function() {
        document.getElementById('searching-box').style.display = 'block';
        document.getElementById('btn-find').style.display = 'none';
        document.getElementById('btn-cancel').style.display = 'block';
        document.getElementById('error').textContent = '';

        const diffLabels = { easy: '🟢 Лёгкая', medium: '🟡 Средняя', hard: '🔴 Сложная' };
        document.getElementById('searching-diff').textContent = 'Сложность: ' + (diffLabels[selectedDifficulty] || selectedDifficulty);

        searchSeconds = 0;
        searchTimer = setInterval(function() {
            searchSeconds++;
            document.getElementById('search-timer').textContent = searchSeconds + ' сек';
        }, 1000);

        socket.emit('find_match', { username: username, difficulty: selectedDifficulty });
    });

    document.getElementById('btn-cancel').addEventListener('click', function() {
        socket.emit('cancel_search', { username: username });
        stopSearch();
    });

    function stopSearch() {
        clearInterval(searchTimer);
        document.getElementById('searching-box').style.display = 'none';
        document.getElementById('btn-find').style.display = 'block';
        document.getElementById('btn-cancel').style.display = 'none';
    }

    // Создать комнату с другом
    document.getElementById('btn-create').addEventListener('click', function() {
        socket.emit('create_room', { username: username, difficulty: selectedDifficulty });
    });

    // Войти в комнату
    document.getElementById('btn-join').addEventListener('click', function() {
        const room_id = document.getElementById('room_code').value.trim();
        if (!room_id) return showError('Введи код комнаты!');
        localStorage.setItem('should_join', 'true');
        window.location.href = '/duel/' + room_id;
    });

    socket.on('match_found', function(data) {
        stopSearch();
        localStorage.setItem('should_join', 'true');
        localStorage.setItem('from_matchmaking', 'true');
        window.location.href = '/duel/' + data.room_id;
    });

    socket.on('room_created', function(data) {
        window.location.href = '/duel/' + data.room_id;
    });

    socket.on('search_cancelled', function() { stopSearch(); });

    socket.on('error', function(data) {
        showError(data.message);
        stopSearch();
    });
</script>
</body>
</html>
