<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Code Duel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #1e1e2e;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 15px;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .nav a:hover { background: #2a2a3e; color: white; }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            width: 420px;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #1e1e2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }

        input:focus { border-color: #a855f7; }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        .btn-find {
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            color: white;
            font-size: 18px;
            padding: 16px;
        }

        .btn-create {
            background: #1e1e2e;
            color: white;
            border: 1px solid #a855f7;
        }

        .btn-join {
            background: #1e1e2e;
            color: white;
            border: 1px solid #555;
        }

        .btn-cancel {
            background: #2a2a3e;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            display: none;
        }

        .divider { color: #444; margin: 16px 0; font-size: 14px; }

        #error { color: #ff6b6b; margin-top: 10px; font-size: 14px; }

        #searching-box {
            display: none;
            background: #1e1e2e;
            border: 1px solid #a855f7;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 12px;
        }

        .searching-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }

        .searching-dots {
            font-size: 28px;
            letter-spacing: 6px;
            color: #a855f7;
            animation: pulse 1.5s infinite;
        }

        .searching-timer { color: #888; font-size: 14px; margin-top: 8px; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .bottom-links { margin-top: 24px; display: flex; justify-content: center; gap: 24px; }

        .bottom-links a { color: #a855f7; text-decoration: none; font-size: 14px; }
        .bottom-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">⚔️ Code Duel</div>
    <div class="nav">
        <a href="/leaderboard">🏆 Рейтинг</a>
    </div>
</div>

<div class="main">
    <div class="container">
        <h1>⚔️ Code Duel</h1>
        <p class="subtitle">Сразись в программировании с реальным соперником</p>

        <input type="text" id="username" placeholder="Твой никнейм" maxlength="20"/>

        <div id="searching-box">
            <div class="searching-title">🔍 Ищем соперника...</div>
            <div class="searching-dots">● ● ●</div>
            <div class="searching-timer" id="search-timer">0 сек</div>
        </div>

        <button class="btn-find" id="btn-find">🎮 Найти соперника</button>
        <button class="btn-cancel" id="btn-cancel">✕ Отменить поиск</button>

        <div class="divider">— или играй с другом —</div>

        <button class="btn-create" id="btn-create">🚀 Создать комнату</button>

        <input type="text" id="room_code" placeholder="Код комнаты" maxlength="8"/>
        <button class="btn-join" id="btn-join">⚔️ Войти в комнату</button>

        <div id="error"></div>

        <div class="bottom-links">
            <a href="/leaderboard">🏆 Таблица лидеров</a>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let searchTimer = null;
    let searchSeconds = 0;

    function showError(msg) {
        document.getElementById('error').textContent = msg;
    }

    function getUsername() {
        return document.getElementById('username').value.trim();
    }

    document.getElementById('btn-find').addEventListener('click', function() {
        const username = getUsername();
        if (!username) return showError('Введи никнейм!');
        localStorage.setItem('username', username);

        document.getElementById('searching-box').style.display = 'block';
        document.getElementById('btn-find').style.display = 'none';
        document.getElementById('btn-cancel').style.display = 'block';
        document.getElementById('error').textContent = '';

        searchSeconds = 0;
        searchTimer = setInterval(function() {
            searchSeconds++;
            document.getElementById('search-timer').textContent = searchSeconds + ' сек';
        }, 1000);

        socket.emit('find_match', { username: username });
    });

    document.getElementById('btn-cancel').addEventListener('click', function() {
        socket.emit('cancel_search', { username: getUsername() });
        stopSearch();
    });

    function stopSearch() {
        clearInterval(searchTimer);
        document.getElementById('searching-box').style.display = 'none';
        document.getElementById('btn-find').style.display = 'block';
        document.getElementById('btn-cancel').style.display = 'none';
    }

    document.getElementById('btn-create').addEventListener('click', function() {
        const username = getUsername();
        if (!username) return showError('Введи никнейм!');
        localStorage.setItem('username', username);
        socket.emit('create_room', { username: username });
    });

    document.getElementById('btn-join').addEventListener('click', function() {
        const username = getUsername();
        const room_id = document.getElementById('room_code').value.trim();
        if (!username) return showError('Введи никнейм!');
        if (!room_id) return showError('Введи код комнаты!');
        localStorage.setItem('username', username);
        localStorage.setItem('room_id', room_id);
        localStorage.setItem('should_join', 'true');
        window.location.href = '/duel/' + room_id;
    });

    socket.on('match_found', function(data) {
        stopSearch();
        localStorage.setItem('room_id', data.room_id);
        localStorage.setItem('should_join', 'true');
        localStorage.setItem('from_matchmaking', 'true');
        window.location.href = '/duel/' + data.room_id;
    });

    socket.on('room_created', function(data) {
        localStorage.setItem('room_id', data.room_id);
        window.location.href = '/duel/' + data.room_id;
    });

    socket.on('search_cancelled', function() {
        stopSearch();
    });

    socket.on('error', function(data) {
        showError(data.message);
        stopSearch();
    });
</script>
</body>
</html>
