<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Code Duel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #1e1e2e;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav { display: flex; gap: 16px; }

        .nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 15px;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .nav a:hover { background: #2a2a3e; color: white; }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            width: 400px;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #1e1e2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }

        input:focus { border-color: #a855f7; }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        .btn-create {
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            color: white;
        }

        .btn-join {
            background: #1e1e2e;
            color: white;
            border: 1px solid #a855f7;
        }

        .divider {
            color: #444;
            margin: 16px 0;
            font-size: 14px;
        }

        #error {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
        }

        .bottom-links {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .bottom-links a {
            color: #a855f7;
            text-decoration: none;
            font-size: 14px;
        }

        .bottom-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">⚔️ Code Duel</div>
    <div class="nav">
        <a href="/leaderboard">🏆 Рейтинг</a>
    </div>
</div>

<div class="main">
    <div class="container">
        <h1>⚔️ Code Duel</h1>
        <p class="subtitle">Сразись с другом в программировании</p>

        <input type="text" id="username" placeholder="Твой никнейм" maxlength="20"/>
        <button class="btn-create" id="btn-create">🚀 Создать дуэль</button>

        <div class="divider">— или войди в существующую —</div>

        <input type="text" id="room_code" placeholder="Код комнаты" maxlength="8"/>
        <button class="btn-join" id="btn-join">⚔️ Войти в дуэль</button>

        <div id="error"></div>

        <div class="bottom-links">
            <a href="/leaderboard">🏆 Таблица лидеров</a>
        </div>
    </div>
</div>

<script>
    const socket = io();

    function showError(msg) {
        document.getElementById('error').textContent = msg;
    }

    document.getElementById('btn-create').addEventListener('click', function() {
        const username = document.getElementById('username').value.trim();
        if (!username) return showError('Введи никнейм!');
        localStorage.setItem('username', username);
        socket.emit('create_room', { username: username });
    });

    document.getElementById('btn-join').addEventListener('click', function() {
        const username = document.getElementById('username').value.trim();
        const room_id = document.getElementById('room_code').value.trim();
        if (!username) return showError('Введи никнейм!');
        if (!room_id) return showError('Введи код комнаты!');
        localStorage.setItem('username', username);
        localStorage.setItem('room_id', room_id);
        localStorage.setItem('should_join', 'true');
        window.location.href = '/duel/' + room_id;
    });

    socket.on('room_created', function(data) {
        localStorage.setItem('room_id', data.room_id);
        window.location.href = '/duel/' + data.room_id;
    });

    socket.on('duel_start', function() {
        window.location.href = '/duel/' + localStorage.getItem('room_id');
    });

    socket.on('error', function(data) {
        showError(data.message);
    });
</script>
</body>
</html>
