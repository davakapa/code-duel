<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Code Duel — Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 400px;
            padding: 40px;
            background: #1e1e2e;
            border-radius: 16px;
            border: 1px solid #333;
        }

        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 32px;
            font-size: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #13131f;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }

        input:focus { border-color: #a855f7; }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 10px 14px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .bottom {
            text-align: center;
            margin-top: 24px;
            color: #888;
            font-size: 14px;
        }

        .bottom a {
            color: #a855f7;
            text-decoration: none;
        }

        .bottom a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">⚔️ Code Duel</div>
    <div class="subtitle">Создай аккаунт</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>Никнейм</label>
        <input type="text" name="username" placeholder="Придумай никнейм" autofocus maxlength="20"/>

        <label>Пароль</label>
        <input type="password" name="password" placeholder="Придумай пароль"/>

        <button type="submit">Создать аккаунт</button>
    </form>

    <div class="bottom">
        Уже есть аккаунт? <a href="/login">Войти</a>
    </div>
</div>
</body>
</html>
