<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Code Duel — Дуэль</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: #1e1e2e;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer {
            font-size: 28px;
            font-weight: bold;
            color: #a855f7;
            font-variant-numeric: tabular-nums;
        }

        .timer.danger { color: #ff6b6b; }

        .players {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #aaa;
        }

        .player-tag {
            padding: 4px 12px;
            border-radius: 20px;
            background: #2a2a3e;
        }

        .player-tag.me { border: 1px solid #a855f7; color: white; }
        .player-tag.done { border: 1px solid #4ade80; color: #4ade80; }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .task-panel {
            width: 380px;
            padding: 24px;
            background: #13131f;
            border-right: 1px solid #333;
            overflow-y: auto;
        }

        .task-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #fff;
        }

        .task-desc {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .tests-title {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .test-case {
            background: #1e1e2e;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 13px;
            color: #ccc;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            background: #1a1a2e;
            color: #e0e0ff;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            padding: 20px;
            border: none;
            outline: none;
            resize: none;
            line-height: 1.6;
            tab-size: 4;
        }

        .bottom-panel {
            background: #1e1e2e;
            border-top: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-submit {
            padding: 10px 28px;
            background: linear-gradient(90deg, #ff6b6b, #a855f7);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-submit:hover { opacity: 0.85; }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

        .results { display: flex; gap: 8px; flex-wrap: wrap; }
        .result-badge { font-size: 18px; }
        .result-text { color: #aaa; font-size: 14px; }

        #waiting-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,15,26,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .waiting-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .room-code-box {
            background: #1e1e2e;
            border: 1px solid #a855f7;
            border-radius: 12px;
            padding: 16px 32px;
            margin: 16px 0;
            text-align: center;
        }

        .room-code-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }

        .room-code {
            font-size: 36px;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 6px;
            color: #a855f7;
        }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 20px;
            background: #2a2a3e;
            border: 1px solid #555;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .waiting-hint {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        #result-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,15,26,0.97);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .result-emoji { font-size: 80px; margin-bottom: 16px; }
        .result-title { font-size: 36px; font-weight: bold; margin-bottom: 8px; }
        .result-sub { color: #aaa; font-size: 18px; margin-bottom: 30px; }

        .btn-home {
            padding: 12px 32px;
            background: #1e1e2e;
            border: 1px solid #a855f7;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="waiting-overlay">
    <div class="waiting-title">⏳ Ждём соперника...</div>
    <div class="room-code-box">
        <div class="room-code-label">Код комнаты — отправь другу:</div>
        <div class="room-code" id="display-room-code">——</div>
        <button class="copy-btn" id="copy-btn">📋 Скопировать</button>
    </div>
    <div class="waiting-hint">Как только друг введёт код — дуэль начнётся автоматически</div>
</div>

<div id="result-overlay">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <div class="result-title" id="result-title">Победа!</div>
    <div class="result-sub" id="result-sub">Ты решил задачу первым</div>
    <button class="btn-home" id="btn-home">🏠 На главную</button>
</div>

<div class="header">
    <div class="logo">⚔️ Code Duel</div>
    <div class="timer" id="timer">05:00</div>
    <div class="players" id="players-display"></div>
</div>

<div class="main">
    <div class="task-panel">
        <div class="task-title" id="task-title">Загрузка...</div>
        <div class="task-desc" id="task-desc"></div>
        <div class="tests-title">Примеры</div>
        <div id="test-cases"></div>
    </div>

    <div class="editor-panel">
        <textarea id="code-editor" placeholder="# Пиши код здесь..."></textarea>
        <div class="bottom-panel">
            <button class="btn-submit" id="submit-btn">▶ Отправить решение</button>
            <div class="results" id="results-display"></div>
            <div class="result-text" id="result-text"></div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const roomId = "{{ room_id }}";
    const username = localStorage.getItem('username');
    const isSecondPlayer = localStorage.getItem('should_join') === 'true';
    let timerInterval = null;
    let secondsLeft = 300;

    // Если второй игрок — сразу скрываем оверлей ожидания
    if (isSecondPlayer) {
        document.getElementById('waiting-overlay').style.display = 'none';
        localStorage.removeItem('should_join');
    } else {
        // Первый игрок — показываем код комнаты
        document.getElementById('display-room-code').textContent = roomId;
    }

    // Кнопки
    document.getElementById('copy-btn').addEventListener('click', function() {
        navigator.clipboard.writeText(roomId);
        this.textContent = '✅ Скопировано!';
        setTimeout(() => { this.textContent = '📋 Скопировать'; }, 2000);
    });

    document.getElementById('submit-btn').addEventListener('click', function() {
        const code = document.getElementById('code-editor').value;
        if (!code.trim()) return;
        this.disabled = true;
        socket.emit('submit_code', { room_id: roomId, code: code, username: username });
        setTimeout(() => { this.disabled = false; }, 2000);
    });

    document.getElementById('btn-home').addEventListener('click', function() {
        window.location.href = '/';
    });

    // Когда сокет подключился
    socket.on('connect', function() {
    if (isSecondPlayer) {
        socket.emit('join_room_event', { username: username, room_id: roomId });
    } else {
        // Первый игрок переподключается к своей комнате
        socket.emit('rejoin_room', { username: username, room_id: roomId });
    }
});

    function startTimer() {
        timerInterval = setInterval(function() {
            secondsLeft--;
            const m = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
            const s = (secondsLeft % 60).toString().padStart(2, '0');
            const el = document.getElementById('timer');
            el.textContent = m + ':' + s;
            if (secondsLeft <= 60) el.classList.add('danger');
            if (secondsLeft <= 0) {
                clearInterval(timerInterval);
                showResult(false, 'Время вышло!', 'Никто не успел решить задачу');
            }
        }, 1000);
    }

    function showTask(task) {
        document.getElementById('task-title').textContent = task.title;
        document.getElementById('task-desc').textContent = task.description;
        const tc = document.getElementById('test-cases');
        tc.innerHTML = '';
        task.tests.forEach(function(t, i) {
            const args = Array.isArray(t.input) ? t.input.join(', ') : Object.values(t.input).join(', ');
            tc.innerHTML += '<div class="test-case"><b>Тест ' + (i+1) + ':</b> solution(' + args + ') → ' + t.output + '</div>';
        });

        // Стартовый код
        const args = task.tests[0].input.length === 2 ? 'a, b' : 'a, b, c';
        document.getElementById('code-editor').value = 'def solution(' + args + '):\n    # пиши здесь\n    pass';
    }

    function showResult(won, title, sub) {
        clearInterval(timerInterval);
        document.getElementById('result-emoji').textContent = won ? '🏆' : '😔';
        document.getElementById('result-title').textContent = won ? '🎉 Победа!' : title;
        document.getElementById('result-sub').textContent = sub;
        document.getElementById('result-overlay').style.display = 'flex';
    }

    // События от сервера
    socket.on('duel_start', function(data) {
        document.getElementById('waiting-overlay').style.display = 'none';
        showTask(data.task);
        startTimer();

        const pd = document.getElementById('players-display');
        pd.innerHTML = '';
        data.players.forEach(function(p) {
            const tag = document.createElement('div');
            tag.className = 'player-tag' + (p === username ? ' me' : '');
            tag.id = 'player-' + p;
            tag.textContent = p === username ? '👤 ' + p + ' (ты)' : '⚔️ ' + p;
            pd.appendChild(tag);
        });
    });

    socket.on('test_results', function(data) {
        document.getElementById('results-display').innerHTML =
            data.results.map(function(r) { return '<span class="result-badge">' + r + '</span>'; }).join('');
        document.getElementById('result-text').textContent = data.passed + '/' + data.total + ' тестов';
        if (data.won) showResult(true, '', 'Ты решил задачу первым!');
    });

    socket.on('opponent_finished', function(data) {
        const tag = document.getElementById('player-' + data.username);
        if (tag) tag.classList.add('done');
        if (data.username !== username && data.place === 1) {
            showResult(false, '😔 Поражение', data.username + ' решил задачу быстрее тебя');
        }
    });

    socket.on('error', function(data) {
        alert(data.message);
    });
</script>
</body>
</html>
