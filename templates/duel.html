<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Code Duel — Дуэль</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Fira+Code:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #14110f;
    --bg-raised: #1c1815;
    --bg-input: #221d19;
    --line: #34302a;
    --text: #f2ede4;
    --text-dim: #8a8278;
    --ember: #ff7a3d;
    --gold: #ffc14d;
    --ok: #6fd98c;
    --loss: #ff5e5e;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.mono { font-family: 'IBM Plex Mono', monospace; }

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--line);
}

.logo {
    font-weight: 700;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo-mark {
    width: 24px;
    height: 24px;
    background: var(--ember);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--bg);
}

.timer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
}

.timer.danger { color: var(--loss); }

.players { display: flex; gap: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

.player-tag {
    padding: 5px 14px 5px 5px;
    border-radius: 100px;
    background: var(--bg-input);
    border: 1px solid var(--line);
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    gap: 7px;
}

.player-tag-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--bg-raised);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
}

.player-tag.me { border-color: var(--ember); color: var(--ember); }
.player-tag.done { border-color: var(--ok); color: var(--ok); }

.round-score {
    font-size: 13px;
    color: var(--gold);
    background: var(--bg-input);
    border: 1px solid var(--line);
    padding: 5px 14px;
    border-radius: 100px;
}

.round-banner {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-raised);
    border: 1px solid var(--ok);
    color: var(--ok);
    padding: 14px 28px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 15px;
    z-index: 150;
    animation: slideUp 0.3s ease;
}

.main { display: flex; flex: 1; overflow: hidden; }

.task-panel {
    width: 380px;
    padding: 28px;
    background: var(--bg-raised);
    border-right: 1px solid var(--line);
    overflow-y: auto;
}

.task-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }

.difficulty-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 100px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 14px;
}

.difficulty-easy { background: rgba(111, 217, 140, 0.12); color: var(--ok); border: 1px solid var(--ok); }
.difficulty-medium { background: rgba(255, 193, 77, 0.12); color: var(--gold); border: 1px solid var(--gold); }
.difficulty-hard { background: rgba(255, 94, 94, 0.12); color: var(--loss); border: 1px solid var(--loss); }

.task-desc { color: var(--text-dim); line-height: 1.6; margin-bottom: 22px; font-size: 14px; }

.tests-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.test-case {
    background: var(--bg-input);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 11px 14px;
    margin-bottom: 8px;
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    color: var(--text-dim);
}

.editor-panel { flex: 1; display: flex; flex-direction: column; }

textarea {
    flex: 1;
    background: #100d0b;
    color: #f0ece2;
    font-family: 'Fira Code', monospace;
    font-size: 14px;
    padding: 22px;
    border: none;
    outline: none;
    resize: none;
    line-height: 1.7;
    tab-size: 4;
}

.bottom-panel {
    background: var(--bg-raised);
    border-top: 1px solid var(--line);
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
}

.btn-submit {
    padding: 12px 26px;
    background: linear-gradient(135deg, var(--ember), #ff5e3d);
    border: none;
    border-radius: 10px;
    color: #1a0f08;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.12s;
}

.btn-submit:hover { transform: translateY(-1px); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.results { display: flex; gap: 8px; flex-wrap: wrap; }
.result-badge { font-size: 17px; }
.result-text { font-family: 'IBM Plex Mono', monospace; color: var(--text-dim); font-size: 13px; }

#waiting-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 17, 15, 0.96);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.waiting-title { font-size: 26px; font-weight: 700; margin-bottom: 16px; }

.room-code-box {
    background: var(--bg-raised);
    border: 1px solid var(--ember);
    border-radius: 16px;
    padding: 20px 36px;
    margin: 16px 0;
    text-align: center;
}

.room-code-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
}

.room-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--ember);
}

.copy-btn {
    margin-top: 12px;
    padding: 9px 20px;
    background: var(--bg-input);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
}

.waiting-hint { color: var(--text-dim); font-size: 13px; margin-top: 10px; }

#result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 17, 15, 0.97);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 200;
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
}
@keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
}

.result-card {
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 44px;
    text-align: center;
    max-width: 480px;
    width: 90%;
}

.result-emoji {
    font-size: 70px;
    display: block;
    margin-bottom: 14px;
    animation: bounceIn 0.55s ease 0.15s both;
}

.result-title {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 8px;
    animation: slideUp 0.4s ease 0.35s both;
}

.result-title.win { color: var(--ok); }
.result-title.loss { color: var(--loss); }
.result-title.draw { color: var(--gold); }

.result-sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 22px;
    animation: slideUp 0.4s ease 0.45s both;
}

.result-stats {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 24px;
    animation: slideUp 0.4s ease 0.55s both;
}

.stat-item { text-align: center; }

.stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    display: block;
}

.stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.rating-change {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    padding: 10px 22px;
    border-radius: 100px;
    margin-bottom: 24px;
    display: inline-block;
    animation: slideUp 0.4s ease 0.65s both;
}

.rating-change.positive { background: rgba(111, 217, 140, 0.12); color: var(--ok); border: 1px solid var(--ok); }
.rating-change.negative { background: rgba(255, 94, 94, 0.12); color: var(--loss); border: 1px solid var(--loss); }

.result-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    animation: slideUp 0.4s ease 0.75s both;
}

.btn-rematch {
    padding: 13px 26px;
    background: linear-gradient(135deg, var(--ember), #ff5e3d);
    border: none;
    border-radius: 12px;
    color: #1a0f08;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}

.btn-home {
    padding: 13px 26px;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
}

.btn-home:hover { background: var(--bg-input); }

.confetti {
    position: fixed;
    width: 9px;
    height: 9px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 300;
}

@keyframes confettiFall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div id="waiting-overlay">
    <div class="waiting-title">⏳ ждём соперника...</div>
    <div class="room-code-box">
        <div class="room-code-label">код комнаты — отправь другу:</div>
        <div class="room-code" id="display-room-code">——</div>
        <button class="copy-btn" id="copy-btn">скопировать</button>
    </div>
    <div class="waiting-hint">как только друг введёт код — дуэль начнётся автоматически</div>
</div>

<div id="result-overlay">
    <div class="result-card">
        <span class="result-emoji" id="result-emoji">🏆</span>
        <div class="result-title" id="result-title">Победа!</div>
        <div class="result-sub" id="result-sub"></div>
        <div class="result-stats" id="result-stats"></div>
        <div class="rating-change" id="rating-change"></div>
        <div class="result-buttons">
            <button class="btn-rematch" id="btn-rematch">⚡ ещё раз</button>
            <button class="btn-home" id="btn-home">на главную</button>
        </div>
    </div>
</div>

<div class="header">
    <div class="logo"><div class="logo-mark">⚔</div>Code Duel</div>
    <div class="round-score mono" id="round-score" style="display: none;"></div>
    <div class="timer" id="timer">05:00</div>
    <div class="players" id="players-display"></div>
</div>

<div class="main">
    <div class="task-panel">
        <div class="task-title" id="task-title">загрузка...</div>
        <div id="difficulty-badge"></div>
        <div class="task-desc" id="task-desc"></div>
        <div class="tests-title">примеры</div>
        <div id="test-cases"></div>
    </div>
    <div class="editor-panel">
        <textarea id="code-editor" placeholder="# пиши код здесь..."></textarea>
        <input type="text" id="answer-input" class="answer-input mono" placeholder="введи ответ..." style="display:none;" />
        <div class="bottom-panel">
            <button class="btn-submit" id="submit-btn">▶ отправить решение</button>
            <div class="results" id="results-display"></div>
            <div class="result-text" id="result-text"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<style>
    .CodeMirror {
        flex: 1;
        height: 100% !important;
        font-family: 'Fira Code', monospace !important;
        font-size: 14px !important;
        background: #100d0b !important;
    }
    .CodeMirror-gutters { background: #150f0c !important; border-right: 1px solid var(--line) !important; }
    .CodeMirror-linenumber { color: var(--text-dim) !important; }
    .cm-s-duel.CodeMirror { color: #f0ece2; }
    .cm-s-duel .cm-keyword { color: #ff7a3d; }
    .cm-s-duel .cm-def { color: #ffc14d; }
    .cm-s-duel .cm-string { color: #6fd98c; }
    .cm-s-duel .cm-number { color: #ffc14d; }
    .cm-s-duel .cm-comment { color: #6b6258; font-style: italic; }
    .cm-s-duel .cm-operator { color: #f0ece2; }
    .cm-s-duel .cm-variable { color: #f0ece2; }
    .CodeMirror-cursor {
        border-left: 2px solid #ffc14d !important;
    }
    .CodeMirror-selected { background: rgba(255, 122, 61, 0.25) !important; }
    .CodeMirror-focused .CodeMirror-selected { background: rgba(255, 122, 61, 0.3) !important; }
    .CodeMirror-matchingbracket { color: #6fd98c !important; font-weight: bold; }
    .editor-panel { display: flex; flex-direction: column; }
    .answer-input {
        flex: 1;
        background: #100d0b;
        color: #f0ece2;
        font-size: 22px;
        padding: 22px;
        border: none;
        outline: none;
        text-align: center;
    }
</style>

<script>
    const socket = io();
    const roomId = "{{ room_id }}";
    const username = "{{ session['username'] }}";
    const isSecondPlayer = localStorage.getItem('should_join') === 'true';
    const fromMatchmaking = localStorage.getItem('from_matchmaking') === 'true';
    let timerInterval = null;
    let matchStartTime = null;
    let currentTask = null;
    let roundsTotal = 1;
    let currentRound = 1;
    let currentScores = {};

    const codeEditor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
        mode: 'python',
        theme: 'duel',
        lineNumbers: true,
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        extraKeys: { Tab: function(cm) { cm.replaceSelection('    ', 'end'); } }
    });

    if (isSecondPlayer) {
        document.getElementById('waiting-overlay').style.display = 'none';
        localStorage.removeItem('should_join');
        if (fromMatchmaking) localStorage.removeItem('from_matchmaking');
    } else {
        document.getElementById('display-room-code').textContent = roomId;
    }

    document.getElementById('copy-btn').addEventListener('click', function() {
        navigator.clipboard.writeText(roomId);
        this.textContent = 'скопировано!';
        setTimeout(() => { this.textContent = 'скопировать'; }, 2000);
    });

    document.getElementById('submit-btn').addEventListener('click', function() {
        const isAnswerMode = currentTask && currentTask.format === 'answer';
        const code = isAnswerMode
            ? document.getElementById('answer-input').value
            : codeEditor.getValue();
        if (!code.trim()) return;
        this.disabled = true;
        socket.emit('submit_code', { room_id: roomId, code: code, username: username });
        setTimeout(() => { this.disabled = false; }, 2000);
    });

    document.getElementById('btn-home').addEventListener('click', function() {
        window.location.href = '/';
    });

    document.getElementById('btn-rematch').addEventListener('click', function() {
        window.location.href = '/';
    });

    socket.on('connect', function() {
        if (isSecondPlayer) {
            if (fromMatchmaking) {
                socket.emit('rejoin_room', { username: username, room_id: roomId });
            } else {
                socket.emit('join_room_event', { username: username, room_id: roomId });
            }
        } else {
            socket.emit('rejoin_room', { username: username, room_id: roomId });
        }
    });

    function startTimer() {
        matchStartTime = Date.now();
        const totalSeconds = 300;
        const endTime = Date.now() + totalSeconds * 1000;

        timerInterval = setInterval(function() {
            const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            const el = document.getElementById('timer');
            el.textContent = m + ':' + s;
            if (remaining <= 60) el.classList.add('danger');
            if (remaining <= 0) {
                clearInterval(timerInterval);
                showResult(false, 'draw', 'время вышло!', 'никто не успел решить задачу', null);
            }
        }, 500);
    }

    function showTask(task) {
        currentTask = task;
        document.getElementById('task-title').textContent = task.title;
        document.getElementById('task-desc').textContent = task.description;

        const badge = document.getElementById('difficulty-badge');
        const labels = { easy: 'easy', medium: 'medium', hard: 'hard' };
        badge.innerHTML = '<span class="difficulty-badge difficulty-' + task.difficulty + '">' + (labels[task.difficulty] || task.difficulty) + '</span>';

        const tc = document.getElementById('test-cases');
        tc.innerHTML = '';

        const format = task.format || 'function';
        const editorWrapper = codeEditor.getWrapperElement();
        const answerInput = document.getElementById('answer-input');

        if (format === 'answer') {
            task.tests.forEach(function(t, i) {
                tc.innerHTML += '<div class="test-case">пример ' + (i+1) + ': вход = ' + JSON.stringify(t.input) + ' → ответ: ' + t.output + '</div>';
            });
            editorWrapper.style.display = 'none';
            answerInput.style.display = 'block';
            answerInput.value = '';
            answerInput.placeholder = 'введи числовой ответ...';
            setTimeout(() => answerInput.focus(), 100);

        } else if (format === 'code') {
            task.tests.forEach(function(t, i) {
                const stdinPreview = (t.stdin || '').split('\n').join(' / ');
                tc.innerHTML += '<div class="test-case">тест ' + (i+1) + ': вход «' + stdinPreview + '» → вывод: ' + t.output + '</div>';
            });
            if (task.input_hint) {
                tc.innerHTML += '<div class="test-case" style="opacity:0.7;">💡 ' + task.input_hint + '</div>';
            }
            editorWrapper.style.display = 'block';
            answerInput.style.display = 'none';
            codeEditor.setValue('# напиши программу здесь\n# используй input() для чтения данных\n# и print() для вывода ответа\n');
            setTimeout(() => codeEditor.focus(), 100);

        } else {
            task.tests.forEach(function(t, i) {
                const args = Array.isArray(t.input) ? t.input.join(', ') : Object.values(t.input).join(', ');
                tc.innerHTML += '<div class="test-case">тест ' + (i+1) + ': solution(' + args + ') → ' + t.output + '</div>';
            });
            editorWrapper.style.display = 'block';
            answerInput.style.display = 'none';

            const argCount = task.tests[0].input.length;
            let args = 'n';
            if (argCount === 2) args = 'a, b';
            if (argCount === 3) args = 'a, b, c';
            if (typeof task.tests[0].input[0] === 'string') args = 's';
            if (Array.isArray(task.tests[0].input[0])) args = 'nums';
            codeEditor.setValue('def solution(' + args + '):\n    # пиши здесь\n    pass');
            setTimeout(() => codeEditor.focus(), 100);
        }

        setTimeout(() => codeEditor.refresh(), 50);
    }

    function getTimeSpent() {
        if (!matchStartTime) return 0;
        return Math.floor((Date.now() - matchStartTime) / 1000);
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + ':' + s.toString().padStart(2, '0');
    }

    function spawnConfetti() {
        const colors = ['#ff7a3d', '#ffc14d', '#6fd98c', '#f2ede4'];
        for (let i = 0; i < 80; i++) {
            setTimeout(function() {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 8 + 6) + 'px';
                el.style.height = (Math.random() * 8 + 6) + 'px';
                el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                el.style.animationDelay = Math.random() * 1 + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }, i * 30);
        }
    }

    function showResult(won, type, title, sub, ratingChange) {
        clearInterval(timerInterval);
        const timeSpent = getTimeSpent();
        const overlay = document.getElementById('result-overlay');

        document.getElementById('result-emoji').textContent = won ? '🏆' : (type === 'draw' ? '🤝' : '😔');

        const titleEl = document.getElementById('result-title');
        titleEl.textContent = won ? 'победа!' : (type === 'draw' ? 'ничья' : title);
        titleEl.className = 'result-title ' + (won ? 'win' : (type === 'draw' ? 'draw' : 'loss'));

        document.getElementById('result-sub').textContent = sub;

        const statsEl = document.getElementById('result-stats');
        const diffLabels = { easy: 'easy', medium: 'medium', hard: 'hard' };
        statsEl.innerHTML = `
            <div class="stat-item">
                <span class="stat-value">${formatTime(timeSpent)}</span>
                <span class="stat-label">время</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">${currentTask ? (diffLabels[currentTask.difficulty] || '—') : '—'}</span>
                <span class="stat-label">сложность</span>
            </div>
        `;

        const ratingEl = document.getElementById('rating-change');
        if (ratingChange !== null && ratingChange !== undefined) {
            ratingEl.style.display = 'inline-block';
            ratingEl.className = 'rating-change ' + (ratingChange > 0 ? 'positive' : 'negative');
            ratingEl.textContent = (ratingChange > 0 ? '+' : '') + ratingChange + ' рейтинга';
        } else {
            ratingEl.style.display = 'none';
        }

        overlay.style.display = 'flex';

        if (won) spawnConfetti();
    }

    function updateRoundScore() {
        const el = document.getElementById('round-score');
        if (roundsTotal <= 1) {
            el.style.display = 'none';
            return;
        }
        el.style.display = 'block';
        const me = currentScores[username] || 0;
        const opponentName = Object.keys(currentScores).find(p => p !== username);
        const opp = opponentName ? (currentScores[opponentName] || 0) : 0;
        el.textContent = 'раунд ' + currentRound + '/' + roundsTotal + ' · ' + me + ' : ' + opp;
    }

    function setupRound(data) {
        document.getElementById('waiting-overlay').style.display = 'none';
        showTask(data.task);
        startTimer();
        roundsTotal = data.rounds_total || 1;
        currentRound = data.round || 1;
        currentScores = data.scores || {};
        const avatars = data.avatars || {};
        updateRoundScore();

        const pd = document.getElementById('players-display');
        pd.innerHTML = '';
        data.players.forEach(function(p) {
            const tag = document.createElement('div');
            tag.className = 'player-tag' + (p === username ? ' me' : '');
            tag.id = 'player-' + p;
            const av = avatars[p] || '⚔️';
            tag.innerHTML = '<span class="player-tag-avatar">' + av + '</span>' + (p === username ? 'ты: ' : 'vs: ') + p;
            pd.appendChild(tag);
        });

        document.getElementById('submit-btn').disabled = false;
        document.getElementById('results-display').innerHTML = '';
        document.getElementById('result-text').textContent = '';
    }

    function showRoundBanner(text) {
        const banner = document.createElement('div');
        banner.className = 'round-banner';
        banner.textContent = text;
        document.body.appendChild(banner);
        setTimeout(() => banner.remove(), 2300);
    }

    socket.on('duel_start', function(data) {
        setupRound(data);
    });

    socket.on('round_start', function(data) {
        setupRound(data);
    });

    socket.on('round_won', function(data) {
        currentScores = data.scores || currentScores;
        currentRound = data.round || currentRound;
        updateRoundScore();
        clearInterval(timerInterval);
        const won = data.username === username;
        showRoundBanner(won ? '🏆 ты выиграл раунд ' + currentRound : '😔 раунд выиграл ' + data.username);
    });

    socket.on('rating_update', function(data) {
        if (data.scores) currentScores = data.scores;
        const sub = roundsTotal > 1 ? 'ты выиграл матч!' : 'ты решил задачу первым!';
        showResult(true, 'win', '', sub, data.change);
    });

    socket.on('test_results', function(data) {
        document.getElementById('results-display').innerHTML =
            data.results.map(function(r) { return '<span class="result-badge">' + r + '</span>'; }).join('');
        document.getElementById('result-text').textContent = data.passed + '/' + data.total + ' тестов';
    });

    socket.on('opponent_finished', function(data) {
        const tag = document.getElementById('player-' + data.username);
        if (tag) tag.classList.add('done');
        if (data.scores) currentScores = data.scores;
        if (data.username !== username && data.place === 1 && data.final) {
            const change = data.rating_change || -25;
            const sub = roundsTotal > 1
                ? data.username + ' выиграл матч'
                : data.username + ' решил задачу быстрее тебя';
            showResult(false, 'loss', 'поражение', sub, change);
        }
    });

    socket.on('error', function(data) { alert(data.message); });
</script>
</body>
</html>
